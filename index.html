<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Restaurant Home</title>
</head>

<body>

    <div class="w-screen h-screen bg-cover bg-[url('https://thumbs.dreamstime.com/b/burger-ingredients-restaurant-menu-background-copy-space-top-view-beef-90761582.jpg')]">

        <div class="w-full flex justify-between items-center px-10 py-5">

            <h1 class="w-3/12 text-3xl font-bold text-white flex items-center gap-2">
                 <img class="bg-white p-2 rounded-full size-16" src="https://img.icons8.com/?size=100&id=35746&format=png">

                Foodies
            </h1>

        <div class="h-full w-6/12 flex text-white font-medium gap-8">
            <a class="font-semibold hover:text-green-500 hover:font-bold cursor-pointer">Home</a>
            <a class="font-semibold hover:text-green-500 hover:font-bold cursor-pointer">Shop</a>
            <a class="font-semibold hover:text-green-500 hover:font-bold cursor-pointer">About</a>
            <a class="font-semibold hover:text-green-500 hover:font-bold cursor-pointer">Contact</a>
        </div>
            <div class="w-3/12 h-full flex items-center justify-center gap-5">
            <button class="font-semibold rounded-xl border-2 bg-green-700 cursor-pointer px-8 py-3 text-white hover:bg-green-800 active:bg-green-500">
                Login
            </button>
             <button class="font-semibold rounded-xl border-2 bg-green-700 cursor-pointer px-8 py-3 text-white hover:bg-green-800 active:bg-green-500">
                Signup
            </button>
        </div>

    </div>
        <div class="relative z-10 flex flex-col justify-center items-center h-full text-center text-white px-5">
            <h1 class="text-6xl font-bold mt-4">
                Tasty and Healthy
            </h1>

            <p class="mt-5 max-w-xl text-lg text-">
                We believe great food brings people together. Discover authentic flavors, exceptional service, and a dining experience you'll always remember.
            </p>
        </div>
    </div>

</body>
</html>
